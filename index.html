<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estado de candidatura | Mind&Code</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 480px;
}

.logo {
    width: 180px;
    margin: 0 auto 30px;
    display: block;
    filter: brightness(0) invert(1);
}

.card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

h2 {
    color: #1a202c;
    font-size: 24px;
    margin-bottom: 8px;
    text-align: center;
}

.subtitle {
    color: #718096;
    text-align: center;
    margin-bottom: 30px;
    font-size: 14px;
}

.input-group {
    position: relative;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 16px 16px 16px 48px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    font-size: 16px;
    transition: all 0.3s;
}

input:focus {
    outline: none;
    border-color: #667eea;
}

.input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #a0aec0;
}

button {
    width: 100%;
    padding: 16px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

button:hover:not(:disabled) {
    background: #5568d3;
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.spinner {
    width: 20px;
    height: 20px;
    border: 2px solid transparent;
    border-top-color: white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    display: none;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.loading .spinner {
    display: block;
}

.result {
    margin-top: 24px;
    padding: 20px;
    border-radius: 12px;
    display: none;
    animation: slideIn 0.3s ease;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.result.show {
    display: block;
}

.result.success {
    background: #f0fff4;
    border: 1px solid #9ae6b4;
}

.result.error {
    background: #fed7d7;
    border: 1px solid #fc8181;
}

.result.no-apto {
    background: #fffaf0;
    border: 1px solid #fbd38d;
}

.status-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 12px;
}

.success .status-badge {
    background: #c6f6d5;
    color: #22543d;
}

.no-apto .status-badge {
    background: #feebc8;
    color: #744210;
}

.error .status-badge {
    background: #fed7d7;
    color: #742a2a;
}

.message {
    color: #4a5568;
    line-height: 1.6;
    font-size: 14px;
}

.security-note {
    margin-top: 20px;
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.8);
}

/* Responsive */
@media (max-width: 480px) {
    .card {
        padding: 24px;
    }
}
</style>
<base target="_blank">
</head>

<body>

<div class="container">
    <!-- Logo blanco para fondo oscuro -->
    <img src="TU_LOGO_BLANCO_AQUI" class="logo" alt="Mind&Code">
    
    <div class="card">
        <h2>Consulta tu estado</h2>
        <p class="subtitle">Ingresa tu email registrado en el proceso</p>
        
        <div class="input-group">
            <span class="input-icon">✉️</span>
            <input 
                type="email" 
                id="emailInput" 
                placeholder="tu@email.com"
                autocomplete="email"
            >
        </div>
        
        <button onclick="buscar()" id="btnBuscar">
            <span class="spinner"></span>
            <span class="btn-text">Buscar candidatura</span>
        </button>
        
        <div id="resultado" class="result"></div>
    </div>
    
    <p class="security-note">🔒 Tu información está protegida</p>
</div>

<script>
// ⚠️ IMPORTANTE: Esto es solo para demo. En producción, usa un backend.
const API = "https://script.google.com/macros/s/AKfycbyoEE7LSu6sVTgQtwtIqCE2tOhKnSTY165IA-emVEJ0WkJxZzZI9yv3qbQ7uZqnMd3T7/exec";

let data = [];
let isLoading = false;

// Cargar datos al iniciar
async function cargarDatos() {
    try {
        const res = await fetch(API);
        if (!res.ok) throw new Error('Error de conexión');
        data = await res.json();
        console.log("Candidatos cargados:", data.length);
    } catch (e) {
        console.error("Error:", e);
        mostrarError("No pudimos conectar con la base de datos. Intenta más tarde.");
    }
}

// Validar email
function validarEmail(email) {
    const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return regex.test(email);
}

// Escape HTML para prevenir XSS
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Mostrar resultado
function mostrarResultado(html, tipo) {
    const resultado = document.getElementById('resultado');
    resultado.innerHTML = html;
    resultado.className = `result ${tipo} show`;
}

function mostrarError(mensaje) {
    mostrarResultado(`
        <div class="status-badge">❌ Error</div>
        <div class="message">${escapeHtml(mensaje)}</div>
    `, 'error');
}

// Buscar candidato
async function buscar() {
    if (isLoading) return;
    
    const emailInput = document.getElementById('emailInput');
    const btn = document.getElementById('btnBuscar');
    const email = emailInput.value.trim().toLowerCase();
    
    // Validaciones
    if (!email) {
        mostrarError("Por favor ingresa tu email");
        emailInput.focus();
        return;
    }
    
    if (!validarEmail(email)) {
        mostrarError("Ingresa un email válido");
        emailInput.focus();
        return;
    }
    
    // Estado de carga
    isLoading = true;
    btn.disabled = true;
    btn.classList.add('loading');
    
    // Si los datos no cargaron aún, intentar cargar
    if (data.length === 0) {
        await cargarDatos();
    }
    
    // Buscar (simulamos delay para UX)
    setTimeout(() => {
        const candidato = data.find(c => 
            (c.Email || "").toLowerCase() === email
        );
        
        if (!candidato) {
            mostrarError("No encontramos una candidatura con ese email. Verifica que esté escrito correctamente.");
        } else {
            const estado = escapeHtml((candidato["Estado del contacto"] || "Pendiente").trim());
            const esNoApto = estado.toLowerCase() === "no apto";
            
            if (esNoApto) {
                mostrarResultado(`
                    <div class="status-badge">📋 ${estado}</div>
                    <div class="message">
                        Gracias por tu interés en Mind&Code.<br><br>
                        En esta ocasión no continuaremos con tu proceso, pero 
                        guardamos tu perfil para futuras oportunidades que se ajusten 
                        mejor a tu experiencia.
                    </div>
                `, 'no-apto');
            } else {
                mostrarResultado(`
                    <div class="status-badge">✅ ${estado}</div>
                    <div class="message">
                        ¡Buenas noticias! Tu proceso sigue activo. 
                        Pronto nos pondremos en contacto contigo con los siguientes pasos.
                    </div>
                `, 'success');
            }
        }
        
        // Reset estado
        isLoading = false;
        btn.disabled = false;
        btn.classList.remove('loading');
    }, 600); // Delay artificial para que se sienta "real"
}

// Permitir buscar con Enter
document.getElementById('emailInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') buscar();
});

// Cargar datos al inicio
cargarDatos();
</script>

</body>
</html>
