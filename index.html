<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estado de candidatura | Mind&Code</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI,system-ui;
background: linear-gradient(225deg, #ffffff 80%, #647d00 100%);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.container{
max-width:480px;
width:100%;
}

.logo{
width:180px;
display:block;
margin:0 auto 30px;
}

.card{
background:white;
padding:40px;
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:8px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:30px;
font-size:14px;
}

.input-group{
position:relative;
margin-bottom:20px;
}

input{
width:100%;
padding:16px;
border:2px solid #e5e5e5;
border-radius:10px;
font-size:16px;
}

input:focus{
outline:none;
border-color:#647d00;
}

button{
width:100%;
padding:16px;
background:#647d00;
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#556a00;
}

.result{
margin-top:25px;
padding:20px;
border-radius:10px;
display:none;
}

.result.show{
display:block;
}

.success{
background:#e8f5e1;
border:1px solid #b7d2a3;
}

.error{
background:#ffe6e6;
border:1px solid #ffb3b3;
}

.status{
font-weight:700;
margin-bottom:8px;
}

.message{
font-size:14px;
line-height:1.6;
}

.security{
text-align:center;
margin-top:20px;
font-size:12px;
color:#555;
}

</style>
</head>

<body>

<div class="container">

<img src="transparent-Photoroom (6).png" class="logo">

<div class="card">

<h2>Consulta tu candidatura</h2>
<p class="subtitle">Ingresa el email con el que postulaste</p>

<div class="input-group">
<input
type="email"
id="emailInput"
placeholder="tu@email.com"
>
</div>

<button onclick="buscar()">Consultar estado</button>

<div id="resultado" class="result"></div>

</div>

<p class="security">🔒 Tu información está protegida</p>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyoEE7LSu6sVTgQtwtIqCE2tOhKnSTY165lA-emVEJ0WkJXzZI9yv3qbQ7uZqnMd3T7/exec";

function mostrar(html,tipo){

const div=document.getElementById("resultado");

div.className="result "+tipo+" show";
div.innerHTML=html;

}

function validarEmail(email){

return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

}

async function buscar(){

const email=document.getElementById("emailInput").value.trim().toLowerCase();

if(!email){
mostrar("<div class='status'>Error</div><div class='message'>Ingresa tu email</div>","error");
return;
}

if(!validarEmail(email)){
mostrar("<div class='status'>Error</div><div class='message'>Email inválido</div>","error");
return;
}

try{

const res=await fetch(API+"?email="+encodeURIComponent(email));

const data=await res.json();

if(!data.encontrado){

mostrar(
"<div class='status'>No encontrado</div><div class='message'>No encontramos una candidatura con ese email.</div>",
"error"
);

return;

}

const estado=(data.estado||"Pendiente").toLowerCase();

if(estado==="contratado"){

mostrar(
"<div class='status'>Resultado del proceso</div><div class='message'>Felicitaciones por el resultado obtenido en su proceso de postulación. Gracias por confiar en Mind&Code 💚</div>",
"success"
);

}else if(estado==="no apto"){

mostrar(
"<div class='status'>Proceso finalizado</div><div class='message'>Gracias por tu confianza en Mind&Code. En esta ocasión no continuaremos con tu proceso, pero guardaremos tu perfil para futuras oportunidades. Si no deseas recibir más ofertas laborales por favor envía un correo a hi@mindcode.cl 💚</div>",
"error"
);

}else if(estado==="no disponible"){

mostrar(
"<div class='status'>Proceso cerrado</div><div class='message'>Proceso cerrado. Si no deseas recibir más ofertas laborales por favor envía un correo a hi@mindcode.cl 💚</div>",
"error"
);

}else{

mostrar(
"<div class='status'>"+data.estado+"</div><div class='message'>Tu proceso sigue activo. Pronto te contactaremos con los siguientes pasos.</div>",
"success"
);

}

}catch(e){

mostrar(
"<div class='status'>Error</div><div class='message'>No pudimos consultar el estado. Intenta nuevamente.</div>",
"error"
);

}

}

document.getElementById("emailInput").addEventListener("keypress",function(e){

if(e.key==="Enter")buscar();

});

</script>

</body>
</html>
